name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install --quiet pyinstaller psutil librosa

      - name: Build discoflow-backend.exe
        run: |
          python -m PyInstaller `
            --onefile `
            --name discoflow-backend `
            --distpath dist `
            --workpath build `
            --noconsole `
            backend/main.py

      - name: Package mod.zip
        run: Compress-Archive -Path mod\* -DestinationPath dist\mod.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/discoflow-backend.exe
            dist/mod.zip
            install.bat
          body: |
            ## Installation

            1. Download `install.bat` below.
            2. Right-click → **Run as administrator**.
            3. Launch Dead as Disco. DiscoFlow starts automatically.

            No Python, no manual steps, no extra downloads needed.

            See the [README](https://github.com/${{ github.repository }}#readme) for Spotify setup.
